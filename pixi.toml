[workspace]
name = "dbc"
version = "0.1.0"
description = "Automations for the dbc project"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.8"

[environments]
cdn = ["cdn"]
docs = ["docs"]
gui = ["gui"]

[feature.cdn.dependencies]
pyyaml = ">=6.0"
faker = ">=19.0.0"

[feature.cdn.tasks]
cdn-generate = "python scripts/cdn.py"
cdn-serve = "python -m http.server -d cdn-dev"

[feature.docs.pypi-dependencies]
mkdocs-llmstxt = "*"
mkdocs-material = { version = "*", extras = ["imaging"] }
mkdocs-macros-plugin = "*"

[feature.docs.dependencies]
cairo = ">=1.18.4,<2"

[feature.docs.tasks]
docs-build = "mkdocs build"
docs-serve = "mkdocs serve --livereload"

[feature.gui.dependencies]
nodejs = ">=20"
rust = ">=1.80"
go = ">=1.21"

# Linux-only system libraries required by Tauri v2 (GTK/WebKit stack).
# macOS uses native WKWebView and doesn't need these.
[feature.gui.system-requirements]
linux = "4.18"
libc = { family = "glibc", version = "2.34" }

[feature.gui.target.linux-64.dependencies]
pkg-config = ">=0.29"
gtk3 = ">=3.24"
"webkit2gtk4.1" = ">=2.48"
librsvg = ">=2.58"
zlib = ">=1.3"
expat = ">=2.7"

[feature.gui.tasks]
gui-install   = { cmd = "npm install", cwd = "gui" }
gui-dev       = { cmd = "npm run tauri dev", cwd = "gui", depends-on = ["gui-install"] }
gui-build     = { cmd = "npm run tauri build", cwd = "gui", depends-on = ["gui-sidecar", "gui-install"] }
gui-check     = { cmd = "npm run check", cwd = "gui", depends-on = ["gui-install"] }
gui-sidecar   = { cmd = "bash gui/scripts/build-sidecar.sh" }
gui-test-rust = { cmd = "cargo test", cwd = "gui/src-tauri", depends-on = ["gui-install"] }
gui-test-fix  = { cmd = "go test ./...", cwd = "gui/testdata/fixture-registry" }
gui-test      = { depends-on = ["gui-check", "gui-test-rust", "gui-test-fix"] }
