name: GUI Release

on:
  push:
    tags:
      - 'gui-v*'
  pull_request:
    paths:
      - 'gui/**'
      - '.github/workflows/gui-release.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: gui
        run: npm ci

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build sidecar
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: bash gui/scripts/build-sidecar.sh --target ${{ matrix.target }}

      - name: Setup macOS signing
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_P12_PASSWORD: ${{ secrets.MACOS_SIGN_P12_PASSWORD }}
        run: |
          echo "APPLE_CERTIFICATE=$MACOS_SIGN_P12" >> $GITHUB_ENV
          echo "APPLE_CERTIFICATE_PASSWORD=$MACOS_SIGN_P12_PASSWORD" >> $GITHUB_ENV
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        with:
          projectPath: gui
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            gui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            gui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            gui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            gui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
