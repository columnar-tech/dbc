name: WASM
on:
  push:
    branches:
      - 'main'
    paths:
      - '*.go'
      - 'auth/**'
      - 'config/**'
      - 'internal/**'
      - 'wasm/**'
      - 'packages/npm-wasm/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/wasm.yml'
  pull_request:
    paths:
      - '*.go'
      - 'auth/**'
      - 'config/**'
      - 'internal/**'
      - 'wasm/**'
      - 'packages/npm-wasm/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/wasm.yml'

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest', 'macos-latest', 'windows-latest' ]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: 1.25
          cache: true
          cache-dependency-path: go.sum
      - name: Node version
        run: node --version
      - name: Build @columnar-tech/dbc-wasm
        run: node packages/npm-wasm/scripts/build.js
      - name: Loader unit tests
        run: node packages/npm-wasm/test/normalize.test.cjs
      # The windows-latest run validates the drive-root filesystem round-trip
      # (os.MkdirAll / os.OpenRoot over C:\...) through Node fs — the Phase 4
      # Windows-host gate that cannot be exercised on Linux/macOS.
      - name: Smoke test
        run: node packages/npm-wasm/test/smoke.cjs
