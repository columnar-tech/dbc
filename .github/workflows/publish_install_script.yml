name: Publish install.sh

on:
  push:
    branches:
      - 'main'
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # For AWS auth

jobs:
  publish_install:
    name: Publish install scripts
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-session-name: deploy-production-${{ github.run_id }}-${{ github.run_attempt }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check role
        run: |
          aws sts get-caller-identity
      - name: Upload install.sh
        run: |
          aws s3 cp scripts/install.sh "s3://${AWS_BUCKET}/install.sh"
          aws s3 cp scripts/install.ps1 "s3://${AWS_BUCKET}/install.ps1"
        env:
          AWS_BUCKET: ${{ vars.AWS_BUCKET }}
