name: Release dbc

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    environment: snapshot
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: './go.mod'

      # pull more recent version of wixl than in the ubuntu repos
      # needed for Path Env update support
      - name: Install wixl
        run: |
          wget http://ftp.de.debian.org/debian/pool/main/m/msitools/wixl-data_0.106+repack-1_all.deb
          wget http://ftp.de.debian.org/debian/pool/main/m/msitools/wixl_0.106+repack-1_amd64.deb
          sudo apt install -y msitools ./wixl-data_0.106+repack-1_all.deb ./wixl_0.106+repack-1_amd64.deb
          rm ./wixl-data_0.106+repack-1_all.deb ./wixl_0.106+repack-1_amd64.deb

      - name: install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3

      - name: Import signing GPG key
        env:
          COLUMNAR_GPG_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: |
          echo "$COLUMNAR_GPG_KEY" | gpg --batch --import
          KEY_ID=$(gpg -K | sed -n '/^\s/s/\s*//p')
          printf "trust\n5\ny\nquit\n" | gpg --batch --no-tty --command-fd 0 --edit-key "$KEY_ID"
          echo "default-cache-ttl 46000" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent "RELOADAGENT" /bye
          KEYGRIP=$(gpg -K --with-keygrip | grep -m 1 "Keygrip =" | awk '{print $3}')
          gpg-connect-agent "PRESET_PASSPHRASE $KEYGRIP -1 $(echo -n '${{ secrets.SIGNING_PASSWORD }}' | od -An -t x1 | tr -d ' ')"

      - name: "Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Wheel
        run: pip install wheel

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        id: gorelease-snapshot
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release -p 20 --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'

      - name: Create and verify npm packages
        run: |
          VERSION="${{ fromJSON(steps.gorelease-snapshot.outputs.metadata).version }}"
          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            node packages/npm/scripts/create_packages.js \
              --version "$VERSION" \
              --platform "$platform" \
              --archive "dist/dbc-${platform}-${VERSION}.tar.gz"
          done
          node packages/npm/scripts/create_packages.js \
            --version "$VERSION" \
            --platform windows-amd64 \
            --archive "dist/dbc-windows-amd64-${VERSION}.zip"

          # Verify we can install
          cd packages/npm/wrapper
          npm install ../packages/dbc-linux-x64
          npm install
          node bin/dbc.js --version

      - name: Upload Snapshot Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot-artifacts
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sig
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/msi/**/*.msi
            dist/python/*
            packages/npm/packages/*/
            packages/npm/wrapper/

  production_deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push'
    permissions:
      contents: write
      id-token: write # For AWS auth
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: './go.mod'
          cache: false

      # pull more recent version of wixl than in the ubuntu repos
      # needed for Path Env update support
      - name: Install wixl
        run: |
          wget http://ftp.de.debian.org/debian/pool/main/m/msitools/wixl-data_0.106+repack-1_all.deb
          wget http://ftp.de.debian.org/debian/pool/main/m/msitools/wixl_0.106+repack-1_amd64.deb
          sudo apt install -y msitools ./wixl-data_0.106+repack-1_all.deb ./wixl_0.106+repack-1_amd64.deb
          rm ./wixl-data_0.106+repack-1_all.deb ./wixl_0.106+repack-1_amd64.deb

      - name: install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3

      - name: Import signing GPG key
        env:
          COLUMNAR_GPG_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: |
          echo "$COLUMNAR_GPG_KEY" | gpg --batch --import
          KEY_ID=$(gpg -K | sed -n '/^\s/s/\s*//p')
          printf "trust\n5\ny\nquit\n" | gpg --batch --no-tty --command-fd 0 --edit-key "$KEY_ID"
          echo "default-cache-ttl 46000" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent "RELOADAGENT" /bye
          KEYGRIP=$(gpg -K --with-keygrip | grep -m 1 "Keygrip =" | awk '{print $3}')
          gpg-connect-agent "PRESET_PASSPHRASE $KEYGRIP -1 $(echo -n '${{ secrets.SIGNING_PASSWORD }}' | od -An -t x1 | tr -d ' ')"

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          role-session-name: deploy-production-${{ github.run_id }}-${{ github.run_attempt }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: "Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Install Wheel
        run: pip install wheel

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: "columnar"
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # cross-platform macos notarization/signing
      - name: Install anchore/quill
        run: |
          curl -sSfL https://get.anchore.io/quill | sudo sh -s -- -b /usr/local/bin

      # setup digicert signing
      - uses: digicert/ssm-code-signing@1d820463733701cf1484c7eb5d7d24a15ca2c454  # v1.2.1
        id: digicert

      - name: Setup Certificate and Env
        run: |
          curl -fSslL https://github.com/ebourg/jsign/releases/download/7.0/jsign_7.0_all.deb -o jsign_7.0_all.deb
          sudo dpkg --install jsign_7.0_all.deb
          rm jsign_7.0_all.deb

          echo "PKCS11_CONFIG=${PKCS11_CONFIG}" >> "$GITHUB_ENV"
          SM_TOOLS_DIR=$(dirname "$(realpath "${PKCS11_CONFIG}")")
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 -d > "${SM_TOOLS_DIR}/Certificate_pkcs12.p12"
          echo "SM_HOST=${{ secrets.SM_HOST }}" >> "$GITHUB_ENV"
          echo "SM_API_KEY=${{ secrets.SM_API_KEY }}" >> "$GITHUB_ENV"
          echo "SM_CLIENT_CERT_FILE=${SM_TOOLS_DIR}/Certificate_pkcs12.p12" >> "$GITHUB_ENV"
          echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.SM_CLIENT_CERT_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SM_KEYPAIR_ALIAS=${{ secrets.SM_KEYPAIR_ALIAS }}" >> "$GITHUB_ENV"

          # clean up
          git clean -xdf
        env:
          PKCS11_CONFIG: ${{ steps.digicert.outputs.PKCS11_CONFIG }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        id: gorelease
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release -p 20 --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN}}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          DBC_TAP_GITHUB_PAT: ${{ secrets.DBC_TAP_GITHUB_PAT }}
          DBC_WINGET_GITHUB_PAT: ${{ secrets.DBC_WINGET_GITHUB_PAT }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # 1.14.0
        with:
          packages-dir: dist/python/

      - name: Update CF Latest Key
        if: contains(fromJSON(steps.gorelease.outputs.metadata).version, '-') == false
        run: |
          ETAG=$(aws cloudfront-keyvaluestore describe-key-value-store \
            --kvs-arn=${{ secrets.AWS_CF_KVSTORE_ARN }} | jq -r '.ETag')
          aws cloudfront-keyvaluestore put-key \
            --if-match=$ETAG \
            --kvs-arn=${{ secrets.AWS_CF_KVSTORE_ARN }} \
            --key=latest \
            --value="${RELEASE_VERSION}"
        env:
          RELEASE_VERSION: ${{ fromJSON(steps.gorelease.outputs.metadata).version }}

  publish_npm:
    runs-on: ubuntu-latest
    environment: production
    needs: production_deploy
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write # For npm provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}" # strip leading 'v'

          # Create packages for all platforms from the release we just published
          node packages/npm/scripts/create_packages.js --version "$VERSION"

          # Handle pre-releases: Prereleases (e.g. 0.3.0-rc1) publish under
          # 'next' so they don't become the default for 'npm install
          # @columnar-tech/dbc'
          if echo "$VERSION" | grep -q '-'; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          # Make sure to upload the platform-specific packages before the
          # wrapper since they're deps
          for pkg in packages/npm/packages/*/; do
            npm publish "$pkg" --provenance --access public --tag "$NPM_TAG"
          done
          npm publish packages/npm/wrapper --provenance --access public --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
